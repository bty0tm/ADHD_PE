<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блокировка сайта</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #eaffe1;
            font-family: 'Nunito', sans-serif;
            color: #3d2500;
            overflow: hidden;
        }

        .card {
            background-color: #ffffff;
            padding: 50px 60px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(105, 132, 66, 0.15);
            text-align: center;
            border: 4px solid #bfecac;
            max-width: 400px;
            width: 90%;
        }

        .kawaii-icon {
            font-size: 50px;
            color: #698442;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 15px 0;
            color: #2e6417;
        }

        p {
            font-size: 1.2rem;
            font-weight: 400;
            margin: 0 0 30px 0;
            color: #3d2500;
            line-height: 1.5;
        }

        .btn {
            background-color: #bfecac;
            color: #3d2500;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: inherit;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(130, 209, 114, 0.3);
        }

        .btn:hover {
            background-color: #82d172;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(130, 209, 114, 0.5);
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(130, 209, 114, 0.5);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="kawaii-icon">(๑•̀ㅂ•́)و✧</div>
        <h1>Вернись к работе!</h1>
        <p>Этот сайт пока подождет. Сначала важные дела, потом отдых!</p>
        <button class="btn" onclick="smartClose()">Вернуться к работе</button>
    </div>

    <script>
        function smartClose() {
            if (window.history.length > 1 && document.referrer !== "") {
                window.history.back();
            } else {
                window.location.href = "https://www.google.com/";
                window.close();
            }
        }
    </script>

</body>
</html>
