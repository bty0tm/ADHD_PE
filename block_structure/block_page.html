<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блокировка сайта</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        /* Основные стили страницы */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f1f8e9; /* Очень светлый нежно-зеленый фон */
            font-family: 'Nunito', sans-serif;
            color: #33691e; /* Темно-зеленый для хорошей читаемости текста */
            overflow: hidden;
        }

        /* Карточка блокировки */
        .card {
            background-color: #ffffff;
            padding: 50px 60px;
            border-radius: 40px; /* Максимально скругленные углы */
            box-shadow: 0 15px 35px rgba(139, 195, 74, 0.15); /* Мягкая зеленая тень */
            text-align: center;
            border: 4px solid #dcedc8; /* Светло-зеленая рамочка */
            max-width: 400px;
            width: 90%;
        }

        /* Милая иконка/эмодзи */
        .kawaii-icon {
            font-size: 50px;
            color: #8bc34a;
            margin-bottom: 20px;
            /* Плавная анимация покачивания */
            animation: float 3s ease-in-out infinite;
        }

        /* Заголовок */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0 0 15px 0;
            color: #558b2f;
        }

        /* Подзаголовок */
        p {
            font-size: 1.2rem;
            font-weight: 400;
            margin: 0 0 30px 0;
            color: #689f38;
            line-height: 1.5;
        }

        /* Кнопка закрытия/возврата */
        .btn {
            background-color: #aed581;
            color: #ffffff;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: inherit;
            border-radius: 30px; /* Кнопка в форме пилюли */
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 15px rgba(174, 213, 129, 0.4);
        }

        /* Эффект при наведении на кнопку */
        .btn:hover {
            background-color: #9ccc65;
            transform: translateY(-3px); /* Слегка приподнимается */
            box-shadow: 0 8px 20px rgba(156, 204, 101, 0.5);
        }

        /* Эффект при нажатии на кнопку */
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(156, 204, 101, 0.5);
        }

        /* Анимация левитации для иконки */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="kawaii-icon">(๑•̀ㅂ•́)و✧</div>
        <h1>Вернись к работе!</h1>
        <p>Этот сайт пока подождет. Сначала важные дела, потом отдых!</p>
        <button class="btn" onclick="window.close()">Закрыть вкладку</button>
    </div>

</body>
</html>
